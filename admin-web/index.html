<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单后台 · 小梁宝贝的愿望</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

  <!-- 登录视图 -->
  <div id="loginView" class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
      <div class="text-center mb-6">
        <div class="text-5xl mb-2">🐱</div>
        <h1 class="text-xl font-bold text-slate-700">订单后台登录</h1>
        <p class="text-sm text-slate-500 mt-1">小梁宝贝的愿望</p>
      </div>
      <input id="tokenInput" type="password" placeholder="输入管理员 token"
             class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-violet-400 mb-3"
             onkeydown="if(event.key==='Enter')login()">
      <button onclick="login()"
              class="w-full py-2.5 bg-violet-600 hover:bg-violet-700 text-white rounded-lg font-medium transition">登录</button>
      <p id="loginError" class="text-red-500 text-sm mt-3 text-center hidden"></p>
    </div>
  </div>

  <!-- 列表视图 -->
  <div id="listView" class="hidden min-h-screen">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
      <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2">
            <span class="text-2xl">🐱</span>
            <span class="font-bold text-slate-700">小梁后台</span>
          </div>
          <nav class="flex gap-1">
            <button id="tabOrders" onclick="switchView('orders')" class="text-sm px-3 py-1.5 rounded-lg font-medium bg-violet-100 text-violet-700">订单流水</button>
            <button id="tabProducts" onclick="switchView('products')" class="text-sm px-3 py-1.5 rounded-lg font-medium text-slate-500 hover:bg-slate-100">商品管理</button>
          </nav>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="refreshCurrent()" class="text-sm px-3 py-1.5 bg-violet-50 text-violet-700 rounded-lg hover:bg-violet-100">刷新</button>
          <button onclick="logout()" class="text-sm px-3 py-1.5 text-slate-500 hover:text-slate-700">退出</button>
        </div>
      </div>
    </header>

    <div id="ordersView">
    <main class="max-w-6xl mx-auto px-4 py-4">
      <div class="mb-3 flex items-center gap-2">
        <h2 class="font-bold text-slate-700">订单流水</h2>
        <span id="totalBadge" class="text-xs bg-violet-100 text-violet-700 px-2 py-0.5 rounded-full"></span>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-3 mb-4 flex flex-wrap gap-2 items-center">
        <input id="filterName" type="text" placeholder="商品名筛选" oninput="renderTable()"
               class="px-3 py-1.5 border border-slate-300 rounded-lg text-sm flex-1 min-w-[140px]">
        <input id="filterStart" type="date" onchange="renderTable()" class="px-2 py-1.5 border border-slate-300 rounded-lg text-sm">
        <span class="text-slate-400">—</span>
        <input id="filterEnd" type="date" onchange="renderTable()" class="px-2 py-1.5 border border-slate-300 rounded-lg text-sm">
        <span class="text-xs text-slate-400">下单时刻快照(不含后续状态变更)</span>
      </div>

      <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-500 text-xs uppercase">
              <tr>
                <th class="text-left px-4 py-3">下单时间</th>
                <th class="text-left px-4 py-3">商品</th>
                <th class="text-left px-4 py-3">规格</th>
                <th class="text-right px-4 py-3">价格</th>
                <th class="text-left px-4 py-3">状态</th>
                <th class="text-left px-4 py-3">下单人</th>
                <th class="text-left px-4 py-3">操作</th>
              </tr>
            </thead>
            <tbody id="ordersBody" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
        <div id="emptyState" class="hidden text-center py-12 text-slate-400">
          <div class="text-4xl mb-2">😴</div>
          <p>暂无订单</p>
        </div>
        <div id="loadingState" class="hidden text-center py-12 text-slate-400">
          <p>加载中...</p>
        </div>
      </div>
    </main>
    </div><!-- /ordersView -->

    <div id="productsView" class="hidden">
      <main class="max-w-6xl mx-auto px-4 py-4">
        <div class="mb-3">
          <h2 class="font-bold text-slate-700">商品管理</h2>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
          <div class="flex items-center justify-between mb-3">
            <h3 id="formTitle" class="font-bold text-slate-700 text-sm">添加商品</h3>
            <button id="cancelEditBtn" onclick="cancelEdit()" class="hidden text-xs px-2 py-1 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 cursor-pointer">取消编辑</button>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-3">
            <input id="newName" placeholder="商品名" class="px-3 py-2 border border-slate-300 rounded-lg text-sm">
            <input id="newPrice" type="number" placeholder="价格(数字)" class="px-3 py-2 border border-slate-300 rounded-lg text-sm">
            <select id="newCategory" class="px-3 py-2 border border-slate-300 rounded-lg text-sm">
              <option value="tea">奶茶</option>
              <option value="food">食物</option>
              <option value="fruit">水果</option>
              <option value="interact">互动</option>
            </select>
          </div>
          <div class="mb-3 flex items-center gap-3">
            <div id="imagePreview" class="w-16 h-16 rounded-full bg-pink-50 flex items-center justify-center text-3xl flex-shrink-0 overflow-hidden border border-slate-200">🐱</div>
            <div class="flex-1">
              <span class="text-xs text-slate-500 block mb-1">商品图片(可选,≤1.5MB,不传默认用 🐱)</span>
              <div class="flex items-center gap-2">
                <input id="newImage" type="file" accept="image/*" class="text-xs flex-1" onchange="previewImage(this)">
                <button id="clearImageBtn" onclick="clearImage()" class="hidden text-xs px-2 py-1 bg-red-50 text-red-700 rounded-lg hover:bg-red-100 cursor-pointer">清除</button>
              </div>
            </div>
          </div>
          <div class="mb-2">
            <div class="flex items-center justify-between mb-2">
              <span class="text-xs text-slate-500">规格(可选,小程序选规格时会显示)</span>
              <button onclick="addSpecRow()" class="text-xs px-2 py-1 bg-violet-50 text-violet-700 rounded-lg hover:bg-violet-100 cursor-pointer">+ 添加规格</button>
            </div>
            <div id="specRows" class="space-y-2"></div>
          </div>
          <button id="submitBtn" onclick="submitProduct()" class="mt-3 px-4 py-2 bg-violet-600 hover:bg-violet-700 text-white rounded-lg text-sm font-medium">添加</button>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-500 text-xs uppercase">
                <tr>
                  <th class="text-left px-4 py-3">图</th>
                  <th class="text-left px-4 py-3">商品名</th>
                  <th class="text-left px-4 py-3">分类</th>
                  <th class="text-right px-4 py-3">价格</th>
                  <th class="text-left px-4 py-3">规格</th>
                  <th class="text-left px-4 py-3">状态</th>
                  <th class="text-left px-4 py-3">操作</th>
                </tr>
              </thead>
              <tbody id="productsBody" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
          <div id="productsEmpty" class="hidden text-center py-12 text-slate-400">
            <div class="text-4xl mb-2">😴</div>
            <p>暂无商品</p>
          </div>
        </div>
      </main>
    </div><!-- /productsView -->
  </div>

  <script>
    // ============ 用户必填:把下面这行替换成你的云函数 HTTP 触发 URL ============
    // 拿法见 README.md。形如:https://cloud1-xxx.service.tcloudbase.com/getOrders
    const CLOUD_FUNCTION_URL = 'https://cloud1-d5gaguanke825f14e-1443149733.ap-shanghai.app.tcloudbase.com/getOrders'
    const CLOUD_FUNCTION_URL_UPDATE = 'https://cloud1-d5gaguanke825f14e-1443149733.ap-shanghai.app.tcloudbase.com/updateOrderStatus'
    const CLOUD_FUNCTION_URL_GET_PRODUCTS = 'https://cloud1-d5gaguanke825f14e-1443149733.ap-shanghai.app.tcloudbase.com/getProducts'
    const CLOUD_FUNCTION_URL_ADD_PRODUCT = 'https://cloud1-d5gaguanke825f14e-1443149733.ap-shanghai.app.tcloudbase.com/addProduct'
    const CLOUD_FUNCTION_URL_DELETE_PRODUCT = 'https://cloud1-d5gaguanke825f14e-1443149733.ap-shanghai.app.tcloudbase.com/deleteProduct'
    const CLOUD_FUNCTION_URL_UPLOAD_IMAGE = 'https://cloud1-d5gaguanke825f14e-1443149733.ap-shanghai.app.tcloudbase.com/uploadProductImage'
    const CLOUD_FUNCTION_URL_UPDATE_PRODUCT = 'https://cloud1-d5gaguanke825f14e-1443149733.ap-shanghai.app.tcloudbase.com/updateProduct'
    // =====================================================================

    const STATUS_TEXT  = { pending: '待制作', making: '制作中', done: '已完成' }
    const STATUS_COLOR = {
      pending: 'bg-pink-100 text-pink-700',
      making:  'bg-amber-100 text-amber-700',
      done:    'bg-green-100 text-green-700'
    }
    const NEXT_STATUS = { pending: 'making', making: 'done', done: 'pending' }
    const NEXT_LABEL  = { pending: '→ 制作中', making: '→ 已完成', done: '↺ 重置' }
    const NEXT_CLASS  = {
      pending: 'bg-amber-50 text-amber-700 hover:bg-amber-100',
      making:  'bg-green-50 text-green-700 hover:bg-green-100',
      done:    'bg-slate-100 text-slate-600 hover:bg-slate-200'
    }

    let allOrders = []
    let allProducts = []
    let currentView = 'orders'
    let editingId = null

    const CATEGORY_TEXT = { tea: '奶茶', food: '食物', fruit: '水果', interact: '互动' }

    function getToken()    { return sessionStorage.getItem('adminToken') }
    function setToken(t)   { sessionStorage.setItem('adminToken', t) }
    function clearToken()  { sessionStorage.removeItem('adminToken') }

    function showLogin() {
      document.getElementById('loginView').classList.remove('hidden')
      document.getElementById('listView').classList.add('hidden')
    }
    function showList() {
      document.getElementById('loginView').classList.add('hidden')
      document.getElementById('listView').classList.remove('hidden')
    }

    function login() {
      const t = document.getElementById('tokenInput').value.trim()
      const err = document.getElementById('loginError')
      if (!t) {
        err.textContent = '请输入 token'; err.classList.remove('hidden'); return
      }
      if (CLOUD_FUNCTION_URL === 'YOUR_CLOUD_FUNCTION_HTTP_URL') {
        err.textContent = '请先在 index.html 顶部填入云函数 HTTP URL'
        err.classList.remove('hidden'); return
      }
      setToken(t); err.classList.add('hidden'); showList(); fetchOrders()
    }

    function logout() {
      clearToken(); allOrders = []; showLogin()
    }

    async function cycleStatus(id) {
      const order = allOrders.find(o => o._id === id)
      if (!order) return
      const next = NEXT_STATUS[order.status] || 'pending'
      try {
        const res = await fetch(CLOUD_FUNCTION_URL_UPDATE, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: getToken(), _id: id, status: next })
        })
        const json = await res.json()
        if (json.code === 401) { alert('token 无效'); logout(); return }
        if (json.code !== 0)   { alert('更新失败: ' + (json.message || '未知错误')); return }
        order.status = next
        renderTable()
      } catch (e) {
        alert('网络错误: ' + e.message)
      }
    }

    async function fetchOrders() {
      const body    = document.getElementById('ordersBody')
      const empty   = document.getElementById('emptyState')
      const loading = document.getElementById('loadingState')
      const badge   = document.getElementById('totalBadge')
      body.innerHTML = ''
      empty.classList.add('hidden')
      loading.classList.remove('hidden')
      badge.textContent = ''
      try {
        const res = await fetch(CLOUD_FUNCTION_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: getToken(), limit: 100 })
        })
        const json = await res.json()
        if (json.code === 401) { alert('token 无效'); logout(); return }
        if (json.code !== 0)   { alert('查询失败: ' + (json.message || '未知错误')); return }
        allOrders = json.data || []
        badge.textContent = '共 ' + allOrders.length + ' 条'
        renderTable()
      } catch (e) {
        alert('网络错误: ' + e.message)
      } finally {
        loading.classList.add('hidden')
      }
    }

    function renderTable() {
      const body    = document.getElementById('ordersBody')
      const empty   = document.getElementById('emptyState')
      const nameQ   = document.getElementById('filterName').value.trim().toLowerCase()
      const startQ  = document.getElementById('filterStart').value
      const endQ    = document.getElementById('filterEnd').value

      const filtered = allOrders.filter(o => {
        if (nameQ && !(o.productName || '').toLowerCase().includes(nameQ)) return false
        const ts = o.createTime || o._reportedAt || 0
        if (startQ && ts < new Date(startQ + 'T00:00:00').getTime()) return false
        if (endQ   && ts > new Date(endQ   + 'T23:59:59').getTime()) return false
        return true
      })

      body.innerHTML = filtered.map(o => {
        const ts    = o.createTime || o._reportedAt || 0
        const time  = ts ? formatTime(ts) : '-'
        const specs = o.specs ? Object.entries(o.specs).map(([k,v]) => k + ':' + v).join(' / ') : '-'
        const status= STATUS_TEXT[o.status] || o.status || '-'
        const color = STATUS_COLOR[o.status] || 'bg-slate-100 text-slate-600'
        const openid= maskOpenid(o._openid)
        return `<tr class="hover:bg-slate-50">
          <td class="px-4 py-3 text-slate-500 whitespace-nowrap">${time}</td>
          <td class="px-4 py-3 font-medium">${escapeHtml(o.productName || '-')}</td>
          <td class="px-4 py-3 text-slate-600">${escapeHtml(specs)}</td>
          <td class="px-4 py-3 text-right font-medium text-violet-700">¥${o.price ?? '-'}</td>
          <td class="px-4 py-3"><span class="inline-block text-xs px-2 py-0.5 rounded-full ${color}">${escapeHtml(status)}</span></td>
          <td class="px-4 py-3 text-slate-500 font-mono text-xs">${openid}</td>
          <td class="px-4 py-3">
            <button onclick="cycleStatus('${o._id}')"
                    class="text-xs px-2.5 py-1 rounded-lg font-medium transition whitespace-nowrap cursor-pointer ${NEXT_CLASS[o.status] || ''}">
              ${NEXT_LABEL[o.status] || '?'}
            </button>
          </td>
        </tr>`
      }).join('')

      empty.classList.toggle('hidden', filtered.length !== 0)
    }

    function formatTime(ms) {
      const d = new Date(ms)
      const pad = n => String(n).padStart(2, '0')
      return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate())
        + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds())
    }

    function maskOpenid(id) {
      if (!id) return '-'
      if (id.length <= 10) return id
      return id.slice(0, 6) + '...' + id.slice(-4)
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]))
    }

    function switchView(view) {
      currentView = view
      const isOrders = view === 'orders'
      document.getElementById('ordersView').classList.toggle('hidden', !isOrders)
      document.getElementById('productsView').classList.toggle('hidden', isOrders)
      const activeCls = 'text-sm px-3 py-1.5 rounded-lg font-medium bg-violet-100 text-violet-700'
      const idleCls   = 'text-sm px-3 py-1.5 rounded-lg font-medium text-slate-500 hover:bg-slate-100'
      document.getElementById('tabOrders').className   = isOrders ? activeCls : idleCls
      document.getElementById('tabProducts').className = isOrders ? idleCls   : activeCls
      if (!isOrders && allProducts.length === 0) fetchProducts()
    }

    function refreshCurrent() {
      if (currentView === 'orders') fetchOrders()
      else fetchProducts()
    }

    async function fetchProducts() {
      const body  = document.getElementById('productsBody')
      const empty = document.getElementById('productsEmpty')
      body.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-slate-400">加载中...</td></tr>'
      empty.classList.add('hidden')
      try {
        const res = await fetch(CLOUD_FUNCTION_URL_GET_PRODUCTS, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: getToken(), includeDeleted: true })
        })
        const json = await res.json()
        if (json.code === 401) { alert('token 无效'); logout(); return }
        if (json.code !== 0)   { alert('查询失败: ' + (json.message || '未知错误')); return }
        allProducts = json.data || []
        window.productsMap = {}
        allProducts.forEach(p => { window.productsMap[p._id] = p })
        renderProductsTable()
      } catch (e) {
        alert('网络错误: ' + e.message)
      }
    }

    function renderProductsTable() {
      const body  = document.getElementById('productsBody')
      const empty = document.getElementById('productsEmpty')
      body.innerHTML = allProducts.map(p => {
        const cat = CATEGORY_TEXT[p.category] || p.category || '-'
        let specs = '-'
        if (p.specs && typeof p.specs === 'object' && !Array.isArray(p.specs)) {
          const parts = Object.entries(p.specs).map(([k, v]) => k + ': ' + (Array.isArray(v) ? v.join('/') : ''))
          if (parts.length) specs = parts.join('  |  ')
        } else if (Array.isArray(p.specs) && p.specs.length) {
          specs = p.specs.join(' / ')
        }
        const isDeleted = p.deleted === true
        const status = isDeleted
          ? '<span class="inline-block text-xs px-2 py-0.5 rounded-full bg-slate-200 text-slate-600">已下架</span>'
          : '<span class="inline-block text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700">在售</span>'
        const editBtn = `<button onclick="editProductById('${p._id}')" class="text-xs px-2.5 py-1 rounded-lg font-medium bg-blue-50 text-blue-700 hover:bg-blue-100 cursor-pointer mr-1">编辑</button>`
        const toggleBtn = isDeleted
          ? `<button onclick="toggleDeleted('${p._id}', false)" class="text-xs px-2.5 py-1 rounded-lg font-medium bg-green-50 text-green-700 hover:bg-green-100 cursor-pointer">重新上架</button>`
          : `<button onclick="toggleDeleted('${p._id}', true)" class="text-xs px-2.5 py-1 rounded-lg font-medium bg-red-50 text-red-700 hover:bg-red-100 cursor-pointer">下架</button>`
        const btn = editBtn + toggleBtn
        const imageCell = p.avatarUrl
          ? '<img src="' + escapeHtml(p.avatarUrl) + '" class="w-10 h-10 rounded-full object-cover border border-slate-200">'
          : '<div class="w-10 h-10 rounded-full bg-pink-50 flex items-center justify-center text-xl border border-slate-200">🐱</div>'
        return `<tr class="hover:bg-slate-50">
          <td class="px-4 py-3">${imageCell}</td>
          <td class="px-4 py-3 font-medium">${escapeHtml(p.name || '-')}</td>
          <td class="px-4 py-3 text-slate-600">${escapeHtml(cat)}</td>
          <td class="px-4 py-3 text-right font-medium text-violet-700">¥${p.price ?? '-'}</td>
          <td class="px-4 py-3 text-slate-600">${escapeHtml(specs)}</td>
          <td class="px-4 py-3">${status}</td>
          <td class="px-4 py-3">${btn}</td>
        </tr>`
      }).join('')
      empty.classList.toggle('hidden', allProducts.length !== 0)
    }

    async function submitProduct() {
      const name = document.getElementById('newName').value.trim()
      const price = parseFloat(document.getElementById('newPrice').value)
      const category = document.getElementById('newCategory').value
      if (!name) { alert('请输入商品名'); return }
      if (isNaN(price) || price < 0) { alert('请输入有效价格'); return }
      const specs = {}
      document.querySelectorAll('#specRows .spec-row').forEach(row => {
        const specName = row.querySelector('.spec-name').value.trim()
        const optsRaw = row.querySelector('.spec-opts').value.trim()
        if (!specName) return
        specs[specName] = optsRaw ? optsRaw.split(/[,，]/).map(s => s.trim()).filter(Boolean) : []
      })

      const isEdit = !!editingId

      let avatar = undefined
      if (window.selectedImageBase64) {
        try {
          const res = await fetch(CLOUD_FUNCTION_URL_UPLOAD_IMAGE, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              token: getToken(),
              base64: window.selectedImageBase64,
              contentType: window.selectedImageContentType,
              filename: name
            })
          })
          const json = await res.json()
          if (json.code !== 0) { alert('图片上传失败: ' + (json.message || '未知错误')); return }
          avatar = json.fileId
        } catch (e) {
          alert('图片上传网络错误: ' + e.message); return
        }
      } else if (isEdit && window.imageTouched) {
        avatar = ''
      }

      const product = { name, price, category, specs }
      if (avatar !== undefined) product.avatar = avatar
      const body = isEdit
        ? { token: getToken(), _id: editingId, product }
        : { token: getToken(), product }
      const url = isEdit ? CLOUD_FUNCTION_URL_UPDATE_PRODUCT : CLOUD_FUNCTION_URL_ADD_PRODUCT

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        })
        const json = await res.json()
        if (json.code !== 0) { alert((isEdit ? '修改' : '添加') + '失败: ' + (json.message || '未知错误')); return }
        cancelEdit()
        fetchProducts()
      } catch (e) {
        alert('网络错误: ' + e.message)
      }
    }

    function editProductById(id) {
      const p = window.productsMap && window.productsMap[id]
      if (!p) return
      editProduct(p)
    }

    function editProduct(p) {
      editingId = p._id
      document.getElementById('formTitle').textContent = '编辑商品: ' + (p.name || '')
      document.getElementById('cancelEditBtn').classList.remove('hidden')
      document.getElementById('submitBtn').textContent = '保存修改'
      document.getElementById('newName').value = p.name || ''
      document.getElementById('newPrice').value = (p.price !== undefined && p.price !== null ? p.price : '')
      document.getElementById('newCategory').value = p.category || 'tea'

      document.getElementById('specRows').innerHTML = ''
      if (p.specs && typeof p.specs === 'object' && !Array.isArray(p.specs)) {
        Object.entries(p.specs).forEach(([name, opts]) => {
          addSpecRow(name, Array.isArray(opts) ? opts.join(',') : '')
        })
      }

      window.imageTouched = false
      window.selectedImageBase64 = null
      window.selectedImageContentType = null
      if (p.avatarUrl) {
        document.getElementById('imagePreview').innerHTML = '<img src="' + escapeHtml(p.avatarUrl) + '" class="w-full h-full object-cover">'
        document.getElementById('clearImageBtn').classList.remove('hidden')
      } else {
        document.getElementById('imagePreview').innerHTML = '🐱'
        document.getElementById('clearImageBtn').classList.add('hidden')
      }

      document.getElementById('productsView').scrollIntoView({ behavior: 'smooth', block: 'start' })
    }

    function cancelEdit() {
      editingId = null
      document.getElementById('formTitle').textContent = '添加商品'
      document.getElementById('cancelEditBtn').classList.add('hidden')
      document.getElementById('submitBtn').textContent = '添加'
      document.getElementById('newName').value = ''
      document.getElementById('newPrice').value = ''
      document.getElementById('newCategory').value = 'tea'
      document.getElementById('specRows').innerHTML = ''
      window.imageTouched = false
      window.selectedImageBase64 = null
      window.selectedImageContentType = null
      document.getElementById('newImage').value = ''
      document.getElementById('imagePreview').innerHTML = '🐱'
      document.getElementById('clearImageBtn').classList.add('hidden')
    }

    function addSpecRow(name = '', opts = '') {
      const div = document.createElement('div')
      div.className = 'flex gap-2 spec-row items-center'
      div.innerHTML = '<input class="spec-name px-2 py-1.5 border border-slate-300 rounded-lg text-sm w-28 flex-shrink-0" placeholder="规格名(杯型)" value="' + escapeHtml(name) + '">' +
        '<input class="spec-opts px-2 py-1.5 border border-slate-300 rounded-lg text-sm flex-1" placeholder="选项(逗号分隔:小杯,中杯,大杯)" value="' + escapeHtml(opts) + '">' +
        '<button onclick="removeSpecRow(this)" class="text-xs px-2 py-1.5 bg-red-50 text-red-700 rounded-lg hover:bg-red-100 cursor-pointer flex-shrink-0">删</button>'
      document.getElementById('specRows').appendChild(div)
    }

    function removeSpecRow(btn) {
      btn.closest('.spec-row').remove()
    }

    function previewImage(input) {
      const file = input.files && input.files[0]
      if (!file) return
      if (file.size > 1.5 * 1024 * 1024) {
        alert('图片不能超过 1.5MB,当前 ' + Math.round(file.size / 1024) + 'KB')
        input.value = ''
        return
      }
      const reader = new FileReader()
      reader.onload = function(e) {
        const base64 = e.target.result
        const parts = base64.split(',')
        window.selectedImageBase64 = parts[1]
        window.selectedImageContentType = (parts[0].match(/data:([^;]+)/) || [])[1] || 'image/jpeg'
        window.imageTouched = true
        const preview = document.getElementById('imagePreview')
        preview.innerHTML = '<img src="' + base64 + '" class="w-full h-full object-cover">'
        document.getElementById('clearImageBtn').classList.remove('hidden')
      }
      reader.readAsDataURL(file)
    }

    function clearImage() {
      window.selectedImageBase64 = null
      window.selectedImageContentType = null
      window.imageTouched = true
      document.getElementById('newImage').value = ''
      document.getElementById('imagePreview').innerHTML = '🐱'
      document.getElementById('clearImageBtn').classList.add('hidden')
    }

    async function toggleDeleted(id, deleted) {
      try {
        const res = await fetch(CLOUD_FUNCTION_URL_DELETE_PRODUCT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: getToken(), _id: id, deleted })
        })
        const json = await res.json()
        if (json.code !== 0) { alert('操作失败: ' + (json.message || '未知错误')); return }
        fetchProducts()
      } catch (e) {
        alert('网络错误: ' + e.message)
      }
    }

    ;(function init() {
      if (getToken() && CLOUD_FUNCTION_URL !== 'YOUR_CLOUD_FUNCTION_HTTP_URL') {
        showList(); fetchOrders()
      } else {
        showLogin()
      }
    })()
  </script>
</body>
</html>
